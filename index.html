<!DOCTYPE html>

    <!-- Favicon -->
    <link rel="icon" href="data:,">

</head>
<body>
    <!-- Scroll progress indicator -->
    <div id="scroll-progress" aria-hidden="true"></div>
    <!-- Decorative background orbs -->
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

    <canvas id="particle-canvas"></canvas>

    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <span class="brand-name">Naing Naing Maw</span>
                <span class="brand-title">Electrical Power Engineer &amp; Business Administration</span>
            </div>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <!-- Nav links rendered by js/render.js -->
            <nav class="main-nav" id="main-nav" aria-label="Main navigation"></nav>
        </div>
    </header>

    <main class="main-content" id="main-content">
        <!-- All dynamic sections injected by js/render.js -->
        <section id="section1"          class="section hero-section"></section>
        <section id="section-highlights" class="section alt-section"></section>
        <section id="section-exp"        class="section alt-section"></section>
        <section id="section9"           class="section alt-section"></section>
        <section id="section10"          class="section"></section>
        <section id="section2"           class="section alt-section"></section>

        <!-- Contact: form is static HTML (required by supabase.js) -->
        <section id="section6" class="section alt-section">
            <div class="container">
                <div class="section-heading">
                    <span class="section-eyebrow">Let's Connect</span>
                    <h2>Contact Me</h2>
                </div>
                <!-- Contact card rendered by js/render.js -->
                <div id="contact-card-mount"></div>
                <!-- Contact form â€” static (supabase.js binds to these IDs) -->
                <div class="contact-form-wrap mt-5">
                    <h4>Send a Message</h4>
                    <form id="contact-form" novalidate>
                        <div class="form-group">
                            <label for="contact-name">Name</label>
                            <input type="text" id="contact-name" class="form-control" placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-email">Email</label>
                            <input type="email" id="contact-email" class="form-control" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" class="form-control" rows="5" placeholder="Your message..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" id="contact-submit">
                            <span id="submit-loading"></span>
                            <span id="submit-text">Send Message</span>
                        </button>
                        <div id="form-success" class="form-alert success">
                            <i class="fas fa-check-circle"></i> Message sent! I&rsquo;ll get back to you soon.
                        </div>
                        <div id="form-error" class="form-alert error">
                            <i class="fas fa-exclamation-circle"></i> <span id="form-error-text">Failed to send. Please try again or email me directly.</span>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Back to Top -->
    <button id="back-to-top" aria-label="Back to top" title="Back to top"><i class="fas fa-chevron-up"></i></button>

    <!-- Data + Renderer (load before jQuery so DOM is built first) -->

    <script src="js/render.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js"></script>

    <!-- Custom JS (interactions, dark mode, animations) -->
    <script src="js/script.js"></script>

    <!-- Supabase Contact Form -->
    <script src="js/supabase.js"></script>

    <!-- Cherry Blossom & Sparkle Animation -->
    <script>
    (function () {
        var canvas = document.getElementById('particle-canvas');
        var ctx    = canvas.getContext('2d');
        var W, H;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function rand(a, b) { return Math.random() * (b - a) + a; }

        var PETAL_COLORS = [
            'rgba(180,155,225,A)',
            'rgba(215,165,205,A)',
            'rgba(200,145,185,A)',
            'rgba(155,135,215,A)',
            'rgba(230,200,240,A)',
            'rgba(195,160,220,A)',
            'rgba(235,175,205,A)',
            'rgba(170,160,230,A)',
        ];

        function drawFlower(size, clr, innerClr) {
            for (var i = 0; i < 5; i++) {
                ctx.save();
                ctx.rotate((i / 5) * Math.PI * 2 - Math.PI / 2);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo( size * 0.55, -size * 0.40,  0, -size);
                ctx.quadraticCurveTo(-size * 0.55, -size * 0.40,  0,  0);
                ctx.fillStyle = clr;
                ctx.fill();
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.16, 0, Math.PI * 2);
            ctx.fillStyle = innerClr;
            ctx.fill();
        }

        function drawSparkle(size, alpha) {
            var arms = [size, size * 0.38, size, size * 0.38];
            ctx.beginPath();
            for (var i = 0; i < 8; i++) {
                var ang = (i / 8) * Math.PI * 2 - Math.PI / 2;
                var r   = arms[i % 2 === 0 ? 0 : 1];
                if (i === 0) ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r);
                else         ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(200,215,255,' + alpha + ')';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(230,240,255,' + (alpha * 0.9) + ')';
            ctx.fill();
        }

        var NUM_PETALS = 55;
        var petals = [];
        function spawnPetal(p, startY) {
            var ci = Math.floor(Math.random() * PETAL_COLORS.length);
            p.x = rand(-60, W + 60); p.y = startY !== undefined ? startY : rand(-H, 0);
            p.size = rand(8, 20); p.speed = rand(0.5, 1.5); p.drift = rand(-0.35, 0.35);
            p.rot = rand(0, Math.PI * 2); p.rotSpd = rand(-0.018, 0.018);
            p.sway = rand(0, Math.PI * 2); p.swaySpd = rand(0.006, 0.018); p.swayAmt = rand(0.4, 1.1);
            p.alpha = rand(0.10, 0.28); p.colorRaw = PETAL_COLORS[ci];
            p.inner = 'rgba(255,240,250,' + rand(0.45, 0.80) + ')';
        }
        for (var i = 0; i < NUM_PETALS; i++) { petals.push({}); spawnPetal(petals[i], rand(0, H)); }

        var NUM_SPARKS = 38;
        var sparks = [];
        function spawnSpark(s) {
            s.x = rand(0, W); s.y = rand(0, H); s.size = rand(3, 9);
            s.life = 0; s.maxLife = rand(80, 160);
            s.rot = rand(0, Math.PI * 2); s.rotSpd = rand(-0.04, 0.04);
            s.vy = rand(-0.15, -0.45); s.vx = rand(-0.1, 0.1);
        }
        for (var i = 0; i < NUM_SPARKS; i++) {
            sparks.push({}); spawnSpark(sparks[i]);
            sparks[i].life = Math.floor(Math.random() * sparks[i].maxLife);
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);
            for (var i = 0; i < petals.length; i++) {
                var p = petals[i];
                p.sway += p.swaySpd; p.rot += p.rotSpd;
                p.x += p.drift + Math.sin(p.sway) * p.swayAmt; p.y += p.speed;
                if (p.y > H + 30) spawnPetal(p);
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = 1;
                drawFlower(p.size, p.colorRaw.replace('A', p.alpha), p.inner);
                ctx.restore();
            }
            for (var i = 0; i < sparks.length; i++) {
                var s = sparks[i];
                s.life++; s.x += s.vx; s.y += s.vy; s.rot += s.rotSpd;
                var ratio = s.life / s.maxLife;
                var alpha = (ratio < 0.20 ? ratio / 0.20 : ratio > 0.65 ? (1 - ratio) / 0.35 : 1.0) * 0.55;
                if (s.life >= s.maxLife) spawnSpark(s);
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot);
                drawSparkle(s.size, alpha); ctx.restore();
            }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();
    </script>

</body>
</html>
